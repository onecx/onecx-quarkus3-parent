name: build
on:
  push:
    branches:
      - 'main'
      - 'fix/[0-9]+.[0-9]+.x'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'main'
      - 'fix/[0-9]+.[0-9]+.x'

jobs:
  java:
    uses: onecx/ci-java-lib/.github/workflows/build.yml@v1
    secrets: inherit
    with:
      java-version: '25'